name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============================================================================
  # JOB 1: CODE QUALITY & BUILD
  # ============================================================================
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: ✅ Check Out Code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: 📦 Install Dependencies
      run: npm ci
    
    - name: 🏗️ Build TypeScript
      run: npm run build
      
    - name: ✅ Run Tests
      run: npm test -- --coverage
    
    - name: 📊 Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        fail_ci_if_error: false
        verbose: true
        name: codecov-coverage

  # ============================================================================
  # JOB 2: SECURITY SCANNING
  # ============================================================================
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: ✅ Check Out Code
      uses: actions/checkout@v4
    
    - name: 🔍 Dependency Security Check
      run: |
        npm audit --audit-level=moderate || true
    
    - name: 🚨 Check for Secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified

  # ============================================================================
  # JOB 3: CODE STANDARDS & LINTING
  # ============================================================================
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: ✅ Check Out Code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: 📦 Install Dependencies
      run: npm ci
    
    - name: ✨ Check Code Formatting
      run: |
        npm run build
        # Check if there are TypeScript compilation errors
        npm run build -- --noEmit || exit 1

  # ============================================================================
  # JOB 4: DOCKER BUILD (Optional - only on main branch)
  # ============================================================================
  docker-build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-test, security-scan]
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: ✅ Check Out Code
      uses: actions/checkout@v4
    
    - name: 🐳 Set Up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🐳 Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: abap-mcp-server:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ============================================================================
  # JOB 5: RELEASE NOTES (On main branch)
  # ============================================================================
  release-notes:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-test, security-scan, code-quality]
    
    steps:
    - name: ✅ Check Out Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 📝 Generate Release Notes
      run: |
        echo "✅ Build Pipeline Passed" > release-notes.txt
        echo "- All tests passed" >> release-notes.txt
        echo "- Security scan completed" >> release-notes.txt
        echo "- Code quality checks passed" >> release-notes.txt
        echo "- Ready for deployment" >> release-notes.txt
    
    - name: 📤 Upload Release Notes
      uses: actions/upload-artifact@v3
      with:
        name: release-notes
        path: release-notes.txt

# ============================================================================
# SUCCESS NOTIFICATION
# ============================================================================
